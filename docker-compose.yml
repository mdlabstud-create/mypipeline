services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dropship}
      POSTGRES_USER: ${POSTGRES_USER:-dropship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dropship}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dropship} -d ${POSTGRES_DB:-dropship}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Container-to-container networking
      DATABASE_URL: postgresql://${POSTGRES_USER:-dropship}:${POSTGRES_PASSWORD:-dropship}@postgres:5432/${POSTGRES_DB:-dropship}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations

volumes:
  postgres_data:
  redis_data: